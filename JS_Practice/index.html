<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scientific Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    .btn {
      @apply bg-[#003566] p-3 rounded text-center cursor-pointer hover:bg-[#005BC1];
    }
  </style>
</head>
<body class="bg-[#F5F5F7] flex items-center justify-center h-screen">

  <div class="bg-[#A6ACB2] p-6 rounded-xl shadow-lg w-80">

    <button id="modeBtn" class="col-span-5">
      <label class="inline-flex items-center cursor-pointer">
        <input type="checkbox"  id="modeToggle" class="sr-only peer">
        <div class="relative w-9 h-5 bg-black peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-brand-soft dark:peer-focus:ring-brand-soft rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-buffer after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand"></div>
        <span id="modeLabel" class="ml-2 text-black">DEG</span>
      </label>
    </button>
    <input 
      id="display"
      type="text"
      class="w-full bg-black text-white text-right p-4 rounded mb-4 text-xl outline-none"
      placeholder=""
    />

    <div class="grid grid-cols-5 gap-2 text-[#EDF0FF]">

      <button class="btn">sin</button>
      <button class="btn">cos</button>
      <button class="btn">tan</button>
      <button class="btn">log</button>
      <button class="btn">AC</button>

      <button class="btn">(</button>
      <button class="btn">)</button>
      <button class="btn">π</button>
      <button class="btn">e</button>
      <button class="btn">ln</button>

      <button class="btn">7</button>
      <button class="btn">8</button>
      <button class="btn">9</button>
      <button class="btn">/</button>
      <button class="btn">√</button>

      <button class="btn">4</button>
      <button class="btn">5</button>
      <button class="btn">6</button>
      <button class="btn">*</button>
      <button class="btn">^</button>

      <button class="btn">1</button>
      <button class="btn">2</button>
      <button class="btn">3</button>
      <button class="btn">-</button>
      <button class="btn">x²</button>

      <button class="btn">0</button>
      <button class="btn">.</button>
      <button class="btn">!</button>
      <button class="btn">+</button>
      <button class="btn">=</button>

    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
