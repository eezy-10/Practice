<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PRECISION CALC - Professional Instrument</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .neomorph-extruded {
        box-shadow:
          -6px -6px 12px #ffffff,
          6px 6px 12px #d1d9e6;
      }
      .neomorph-recessed {
        box-shadow:
          inset -6px -6px 12px #ffffff,
          inset 6px 6px 12px #d1d9e6;
      }
      .neomorph-button:active {
        box-shadow:
          inset -4px -4px 8px #ffffff,
          inset 4px 4px 8px #d1d9e6;
        transform: scale(0.98);
      }
      .chassis-shadow {
        box-shadow:
          20px 20px 60px #d1d9e6,
          -20px -20px 60px #ffffff;
      }
      body {
        background-color: #f6f9ff;
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "surface-dim": "#d5dae1",
              "on-secondary-fixed": "#330e21",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2b3136",
              secondary: "#815065",
              "on-tertiary-fixed-variant": "#244f34",
              outline: "#737780",
              "secondary-fixed": "#ffd8e6",
              tertiary: "#3c674b",
              "on-primary-fixed": "#001c39",
              "on-primary-fixed-variant": "#204876",
              "surface-container-highest": "#dee3ea",
              "primary-fixed-dim": "#a5c9fe",
              "on-tertiary-container": "#305b40",
              "on-tertiary": "#ffffff",
              "primary-fixed": "#d4e3ff",
              "surface-container-low": "#eff4fb",
              "secondary-container": "#ffc0d9",
              "inverse-primary": "#a5c9fe",
              "tertiary-fixed-dim": "#a2d2af",
              "on-secondary-container": "#7b4b60",
              "inverse-on-surface": "#ecf1f8",
              error: "#ba1a1a",
              "surface-container-high": "#e4e9f0",
              "on-error": "#ffffff",
              "on-surface-variant": "#43474f",
              "tertiary-container": "#a3d2af",
              primary: "#3b608f",
              "on-primary-container": "#2e5483",
              "surface-tint": "#3b608f",
              "surface-variant": "#dee3ea",
              "primary-container": "#a5c9ff",
              surface: "#f6f9ff",
              "on-tertiary-fixed": "#00210f",
              "surface-container": "#e9eef5",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "on-surface": "#171c21",
              "secondary-fixed-dim": "#f3b5ce",
              "on-background": "#171c21",
              background: "#f6f9ff",
              "surface-bright": "#f6f9ff",
              "on-secondary-fixed-variant": "#66394d",
              "outline-variant": "#c3c6d0",
              "tertiary-fixed": "#beeeca",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              md: "24px",
              lg: "32px",
              "container-padding": "40px",
              unit: "4px",
              xs: "8px",
              sm: "16px",
              "button-gap": "20px",
            },
            fontFamily: {
              "display-xl": ["Plus Jakarta Sans"],
              "button-label": ["Plus Jakarta Sans"],
              "body-sm": ["Plus Jakarta Sans"],
              "display-lg": ["Plus Jakarta Sans"],
              "space-grotesk": ["Space Grotesk"],
            },
            fontSize: {
              "display-xl": [
                "48px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              "button-label": ["20px", { lineHeight: "1", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "1.4", fontWeight: "400" }],
              "display-lg": ["32px", { lineHeight: "1.2", fontWeight: "500" }],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-surface font-body-sm text-on-surface min-h-screen">
    <!-- TopAppBar -->
    <header
      class="fixed top-0 w-full bg-zinc-950 flex justify-between items-center px-6 h-14 z-50 border-b border-zinc-800/50 shadow-inner"
    >
      <div class="flex items-center gap-4">
        <span
          class="text-lg font-bold tracking-widest text-zinc-100 font-space-grotesk uppercase"
          >PRECISION CALC</span
        >
      </div>
      <div class="flex items-center gap-6">
        <button
          class="text-zinc-500 hover:text-teal-300 transition-colors active:scale-95 duration-100"
        >
          <span class="material-symbols-outlined">history</span>
        </button>
        <button
          class="text-zinc-500 hover:text-teal-300 transition-colors active:scale-95 duration-100"
        >
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>
    </header>
    <!-- SideNavBar -->
    <nav
      class="fixed left-0 top-14 h-[calc(100vh-3.5rem)] w-20 border-r border-zinc-900 bg-zinc-950 flex flex-col items-center py-8 space-y-8 shadow-[10px_0_15px_-3px_rgba(0,0,0,0.5)] z-40"
    >
      <div class="flex flex-col items-center mb-4">
        <span class="text-zinc-200 font-black font-space-grotesk text-xs"
          >INSTRUMENT</span
        >
        <span class="text-zinc-600 text-[8px] font-bold">V2.04-ALPHA</span>
      </div>
      <a
        class="text-teal-400 border-r-2 border-teal-400 bg-zinc-900/50 flex flex-col items-center justify-center w-full py-4 transition-all duration-200 ease-in-out font-space-grotesk uppercase text-xs font-medium"
        href="#"
      >
        <span class="material-symbols-outlined mb-1">calculate</span>
        <span class="scale-75">Scientific</span>
      </a>
      <a
        class="text-zinc-600 hover:bg-zinc-900 hover:text-zinc-300 flex flex-col items-center justify-center w-full py-4 transition-all duration-200 ease-in-out font-space-grotesk uppercase text-xs font-medium"
        href="#"
      >
        <span class="material-symbols-outlined mb-1">payments</span>
        <span class="scale-75">Financial</span>
      </a>
      <a
        class="text-zinc-600 hover:bg-zinc-900 hover:text-zinc-300 flex flex-col items-center justify-center w-full py-4 transition-all duration-200 ease-in-out font-space-grotesk uppercase text-xs font-medium"
        href="#"
      >
        <span class="material-symbols-outlined mb-1">show_chart</span>
        <span class="scale-75">Graphing</span>
      </a>
      <a
        class="text-zinc-600 hover:bg-zinc-900 hover:text-zinc-300 flex flex-col items-center justify-center w-full py-4 transition-all duration-200 ease-in-out font-space-grotesk uppercase text-xs font-medium"
        href="#"
      >
        <span class="material-symbols-outlined mb-1">terminal</span>
        <span class="scale-75">Prog</span>
      </a>
    </nav>
    <!-- Main Content Canvas -->
    <main
      class="ml-20 pt-14 min-h-screen flex items-center justify-center p-md"
    >
      <!-- Calculator Chassis -->
      <div
        class="bg-surface w-full max-w-[480px] p-lg rounded-[2.5rem] chassis-shadow border border-white/40"
      >
        <!-- Mode Selectors (Chips) -->
        <div class="flex gap-xs mb-sm px-xs">
          <button
            class="px-sm py-1.5 rounded-full neomorph-recessed bg-surface text-primary font-button-label text-[12px] flex items-center gap-1.5"
          >
            <span
              class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"
            ></span>
            DEG
          </button>
          <button
            class="px-sm py-1.5 rounded-full text-outline font-button-label text-[12px]"
          >
            RAD
          </button>
          <div
            class="ml-auto text-outline-variant font-space-grotesk text-[10px] tracking-widest self-center"
          >
            PRECISION FLOAT v4.0
          </div>
        </div>
        <!-- Display Area (Screen) -->
        <div
          class="neomorph-recessed rounded-xl bg-surface/50 p-lg mb-lg flex flex-col items-end justify-end min-h-[160px] relative overflow-hidden"
        >
          <!-- Decorative background detail -->
          <div
            class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/5 to-transparent"
          ></div>
          <div class="text-outline font-display-lg text-lg mb-2 opacity-60">
            2,450.00 × 12.5%
          </div>
          <div
            class="text-on-surface font-display-xl text-display-xl tracking-tight"
          >
            306.25
          </div>
        </div>
        <!-- Grid of Buttons -->
        <div class="grid grid-cols-4 gap-button-gap">
          <!-- Row 1 -->
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-error hover:bg-error-container/10 transition-all"
          >
            AC
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-primary hover:bg-primary-container/10 transition-all"
          >
            +/-
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-primary hover:bg-primary-container/10 transition-all"
          >
            %
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-primary bg-primary-container/5 hover:bg-primary-container/20 transition-all"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
          <!-- Row 2 -->
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            7
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            8
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            9
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-primary bg-primary-container/5 hover:bg-primary-container/20 transition-all"
          >
            <span class="material-symbols-outlined">remove</span>
          </button>
          <!-- Row 3 -->
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            4
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            5
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            6
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-primary bg-primary-container/5 hover:bg-primary-container/20 transition-all"
          >
            <span class="material-symbols-outlined">add</span>
          </button>
          <!-- Row 4 -->
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            1
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            2
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            3
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-primary bg-primary shadow-lg shadow-primary/20 hover:bg-primary-container transition-all row-span-2"
          >
            <span class="material-symbols-outlined scale-150">drag_handle</span>
          </button>
          <!-- Row 5 -->
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all col-span-2"
          >
            0
          </button>
          <button
            class="neomorph-button neomorph-extruded h-16 rounded-2xl flex items-center justify-center font-button-label text-on-surface hover:bg-surface-container-high transition-all"
          >
            .
          </button>
        </div>
        <!-- Footer Meta -->
        <div class="mt-lg flex justify-between items-center px-xs opacity-40">
          <span
            class="text-[10px] font-space-grotesk tracking-tighter uppercase"
            >Memory Bank: Empty</span
          >
          <span class="material-symbols-outlined text-sm">wifi_tethering</span>
        </div>
      </div>
      <!-- Background Aesthetic Elements -->
      <div
        class="fixed top-1/4 right-1/4 w-96 h-96 bg-primary-container/20 rounded-full blur-[100px] -z-10"
      ></div>
      <div
        class="fixed bottom-1/4 left-1/3 w-64 h-64 bg-tertiary-container/20 rounded-full blur-[80px] -z-10"
      ></div>
    </main>
  </body>
</html>
